name: Hello World

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手動実行スイッチ

jobs:
  hello:
    runs-on: ubuntu-latest  # Runner を ubuntu で起動
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4  # checkout アクション

      - name: Hello World を表示
        run: echo "Hello, GitHub Actions! 🎉"

      - name: ブランチ名を表示
        run: echo "Branch: ${{ github.ref_name }}"
