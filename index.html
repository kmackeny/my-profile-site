<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロフィール</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="profile">
      <section class="profile-card" aria-labelledby="profile-title">
        <p class="eyebrow">Engineer in progress</p>
        <h1 id="profile-title">ようこそ！</h1>
        <p class="lead">Git を勉強中です。</p>
        <p>
          はじめまして。Git を勉強中のエンジニアです。
          日々の学習を少しずつ積み重ねながら、使いやすいWebサイトを作れるよう取り組んでいます。
        </p>
        <div class="status-list" aria-label="現在の取り組み">
          <span>Git</span>
          <span>HTML</span>
          <span>CSS</span>
        </div>
      </section>
    </main>
  </body>
</html>
